<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dadaismo & Surrealismo</title>
    
    <!-- Caricamento di Tailwind CSS per gli stili -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Caricamento di React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Caricamento di Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: black; color: white; }
    </style>
</head>
<body>
    <!-- Qui è dove React inietterà l'applicazione -->
    <div id="root"></div>

    <!-- Script React -->
    <script type="text/babel">

        function ArtePresentation() {
            const [selectedImage, setSelectedImage] = React.useState(null);
            const [drawing, setDrawing] = React.useState(false);
            const [brushColor, setBrushColor] = React.useState('#ff0000');
            const [brushSize, setBrushSize] = React.useState(4);
            const canvasRef = React.useRef(null);

            const getCanvasCoordinates = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return { x: 0, y: 0 };

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            };

            const startDraw = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { x, y } = getCanvasCoordinates(e);

                ctx.beginPath();
                ctx.moveTo(x, y);
                setDrawing(true);
            };

            const draw = (e) => {
                if (!drawing) return;
                const canvas = canvasRef.current;
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const { x, y } = getCanvasCoordinates(e);

                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = brushColor;
                ctx.shadowBlur = 2;
                ctx.shadowColor = brushColor;

                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDraw = () => {
                setDrawing(false);
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            const historicalImages = [
                'https://upload.wikimedia.org/wikipedia/commons/5/50/World_war_I_montage.jpg',
                'https://upload.wikimedia.org/wikipedia/commons/0/0b/Cabaret_Voltaire.jpg',
                'https://upload.wikimedia.org/wikipedia/commons/e/e3/Andre_Breton_1924.jpg'
            ];

            const authors = {
                duchamp: {
                    name: 'Marcel Duchamp',
                    role: 'Padre del Ready-made',
                    image: 'https://media.revistaad.es/photos/6972161c4596bdd6681cfc09/1:1/w_2560%2Cc_limit/GettyImages-514690202.jpg',
                    keywords: ['Dadaismo', 'Provocazione', 'Arte Concettuale', 'Ironia'],
                    bio: "Rivoluzionò il concetto stesso di arte, spostando l'attenzione dall'oggetto all'idea."
                },
                dali: {
                    name: 'Salvador Dalí',
                    role: 'Maestro del Surrealismo',
                    image: 'https://www.tuttiquadri.it/cdn/shop/files/salvador-dali_1.jpg?v=1760205596',
                    keywords: ['Sogno', 'Freud', 'Inconscio', 'Visioni'],
                    bio: "Esplorò l'inconscio umano traducendo i sogni in immagini iperrealistiche e inquietanti."
                }
            };

            const dadaWorks = [
                {
                    title: 'Ruota di Bicicletta',
                    year: '1913',
                    artist: 'Marcel Duchamp',
                    image: 'https://www.vivigreen.eu/wp-content/uploads/2022/03/duchamp-ruota.jpg',
                    keywords: ['Ready-made', 'Provocazione', 'Anti-arte', 'Oggetto comune'],
                    details: {
                        corrente: 'Primo vero e proprio Ready-made Dadaista della storia.',
                        significato: 'Unione assurda di due oggetti di uso comune privati della loro funzione.',
                        messaggio: 'L\'arte non deve avere uno scopo estetico o funzionale.'
                    }
                },
                {
                    title: 'L.H.O.O.Q.',
                    year: '1919',
                    artist: 'Marcel Duchamp',
                    image: 'https://arteref.com/wp-content/uploads/2013/03/L.H.O.O.Q..jpg',
                    keywords: ['Ironia', 'Parodia', 'Gioconda', 'Dissacrazione'],
                    details: {
                        corrente: 'Gesto iconoclasta tipico dello spirito distruttivo Dada.',
                        significato: 'Baffi e pizzetto aggiunti alla Monna Lisa, con un titolo che è un gioco di parole audace.',
                        messaggio: 'Dissacrazione dell\'arte classica e presa in giro del feticismo artistico.'
                    }
                },
                {
                    title: 'Fountain',
                    year: '1917',
                    artist: 'Marcel Duchamp',
                    image: 'https://staticfanpage.akamaized.net/wp-content/uploads/2017/04/4088303823-3e58d3394b-b.jpg',
                    keywords: ['Scandalo', 'Ready-made', 'Arte concettuale', 'Provocazione'],
                    details: {
                        corrente: 'L\'opera Dadaista più celebre e controversa in assoluto.',
                        significato: 'Un orinatoio rovesciato, firmato con lo pseudonimo "R. Mutt".',
                        messaggio: 'L\'artista sceglie l\'oggetto. L\'idea è più importante della realizzazione manuale.'
                    }
                },
                {
                    title: 'Le Grand Verre',
                    year: '1915-1923',
                    artist: 'Marcel Duchamp',
                    image: 'https://barbarainwonderlart.com/wp-content/uploads/2020/01/Marcel-Duchamp-Il-Grande-Vetro-1915-1923dettaglio-della-parte-inferiore.jpg',
                    keywords: ['Trasparenza', 'Mistero', 'Macchine', 'Simbolismo'],
                    details: {
                        corrente: 'Fase di transizione verso un\'arte puramente concettuale.',
                        significato: 'Macchina celibe divisa in due regni: la Sposa in alto, i Celibi in basso.',
                        messaggio: 'Rappresentazione criptica della frustrazione del desiderio umano.'
                    }
                }
            ];

            const surrealWorks = [
                {
                    title: 'La Persistenza della Memoria',
                    year: '1931',
                    artist: 'Salvador Dalí',
                    image: 'https://upload.wikimedia.org/wikipedia/en/d/dd/The_Persistence_of_Memory.jpg',
                    keywords: ['Tempo', 'Sogno', 'Orologi molli', 'Inconscio'],
                    details: {
                        corrente: 'Icona assoluta del Surrealismo e del metodo paranoico-critico.',
                        significato: 'Orologi che si sciolgono in un paesaggio onirico catalano.',
                        messaggio: 'La relatività del tempo e la percezione soggettiva della memoria.'
                    }
                },
                {
                    title: 'Ultima Cena',
                    year: '1955',
                    artist: 'Salvador Dalí',
                    image: 'https://cultura.biografieonline.it/wp-content/uploads/2014/08/Ultima-cena-Salvador-Dali.jpg',
                    keywords: ['Spiritualità', 'Luce', 'Misticismo', 'Geometria'],
                    details: {
                        corrente: 'Surrealismo in chiave mistico-nucleare e religiosa.',
                        significato: 'Rivisitazione dell\'Ultima Cena basata sulla sezione aurea e sul dodecaedro.',
                        messaggio: 'Ricerca del divino attraverso la perfezione geometrica e matematica.'
                    }
                },
                {
                    title: 'La Metamorfosi di Narciso',
                    year: '1937',
                    artist: 'Salvador Dalí',
                    image: 'https://www.lachiavedisophia.com/wp-content/uploads/2017/03/metamorfosi-di-narciso_La-chiave-di-Sophia.jpg',
                    keywords: ['Mito', 'Trasformazione', 'Psicoanalisi', 'Doppia immagine'],
                    details: {
                        corrente: 'Applicazione perfetta del metodo paranoico-critico di Dalí.',
                        significato: 'L\'illusione ottica fa trasformare la figura di Narciso in una mano che tiene un uovo.',
                        messaggio: 'La dualità della percezione e il dramma psicologico del narcisismo.'
                    }
                },
                {
                    title: 'Cristo di San Giovanni della Croce',
                    year: '1951',
                    artist: 'Salvador Dalí',
                    image: 'https://www.passion-estampes.com/deco/affiches/dali/dali-christ-saint-jean-de-la-croix.jpg',
                    keywords: ['Religione', 'Visione', 'Prospettiva', 'Drammaticità'],
                    details: {
                        corrente: 'Ritorno al classicismo e al misticismo surreale.',
                        significato: 'Il Cristo visto dall\'alto, senza corona di spine o sangue, sospeso sul mondo.',
                        messaggio: 'La bellezza assoluta e il sacrificio universale che abbraccia tutta l\'umanità.'
                    }
                }
            ];

            const AuthorBanner = ({ author }) => (
                <div className="bg-zinc-900 border border-zinc-700 rounded-[40px] overflow-hidden shadow-2xl flex flex-col md:flex-row mb-16">
                    <div className="md:w-1/3 h-[400px] overflow-hidden bg-black">
                        <img
                            src={author.image}
                            alt={author.name}
                            className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700"
                        />
                    </div>
                    <div className="md:w-2/3 p-12 flex flex-col justify-center">
                        <h3 className="text-5xl font-black uppercase mb-4">{author.name}</h3>
                        <p className="text-2xl text-zinc-400 mb-6">{author.role}</p>
                        <p className="text-xl text-zinc-300 mb-8 italic">"{author.bio}"</p>
                        <div className="flex flex-wrap gap-4">
                            {author.keywords.map((word, i) => (
                                <span
                                    key={i}
                                    className="px-5 py-3 rounded-full bg-white/10 border border-white/20 tracking-widest uppercase text-sm"
                                >
                                    #{word}
                                </span>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const ArtworkCard = ({ work, border }) => {
                return (
                    <div className={`bg-zinc-900 rounded-[40px] overflow-hidden border ${border} shadow-2xl`}>
                        <div className="relative h-[700px] overflow-hidden bg-black">
                            <img
                                src={work.image}
                                alt={work.title}
                                onClick={() => setSelectedImage(work)}
                                className="w-full h-full object-contain cursor-zoom-in hover:scale-105 transition duration-700"
                            />
                        </div>

                        <div className="p-12">
                            <div className="flex justify-between items-center flex-wrap gap-4 mb-6">
                                <h3 className="text-4xl font-black uppercase">{work.title}</h3>
                                <span className="text-zinc-400 text-xl">{work.year}</span>
                            </div>

                            <p className="text-zinc-300 text-2xl mb-8">{work.artist}</p>

                            <div className="flex flex-wrap gap-4 mb-10">
                                {work.keywords.map((word, i) => (
                                    <span
                                        key={i}
                                        className="px-5 py-3 rounded-full bg-white/10 border border-white/20 text-sm tracking-widest uppercase"
                                    >
                                        #{word}
                                    </span>
                                ))}
                            </div>

                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-black/60 border border-white/10 rounded-3xl overflow-hidden flex flex-col relative group">
                                    <div className="h-32 overflow-hidden">
                                        <img src={work.image} className="w-full h-full object-cover object-top opacity-50 grayscale group-hover:scale-110 transition duration-500" alt="Corrente" />
                                    </div>
                                    <div className="p-6 text-center z-10 flex-grow flex flex-col justify-center">
                                        <p className="text-lg font-bold uppercase mb-3 text-zinc-100">Corrente Artistica</p>
                                        <p className="text-sm text-zinc-400 leading-relaxed">{work.details.corrente}</p>
                                    </div>
                                </div>

                                <div className="bg-black/60 border border-white/10 rounded-3xl overflow-hidden flex flex-col relative group">
                                    <div className="h-32 overflow-hidden">
                                        <img src={work.image} className="w-full h-full object-cover object-center opacity-50 sepia group-hover:scale-110 transition duration-500" alt="Significato" />
                                    </div>
                                    <div className="p-6 text-center z-10 flex-grow flex flex-col justify-center">
                                        <p className="text-lg font-bold uppercase mb-3 text-zinc-100">Significato</p>
                                        <p className="text-sm text-zinc-400 leading-relaxed">{work.details.significato}</p>
                                    </div>
                                </div>

                                <div className="bg-black/60 border border-white/10 rounded-3xl overflow-hidden flex flex-col relative group">
                                    <div className="h-32 overflow-hidden">
                                        <img src={work.image} className="w-full h-full object-cover object-bottom opacity-50 contrast-150 hue-rotate-180 group-hover:scale-110 transition duration-500" alt="Messaggio" />
                                    </div>
                                    <div className="p-6 text-center z-10 flex-grow flex flex-col justify-center">
                                        <p className="text-lg font-bold uppercase mb-3 text-zinc-100">Messaggio</p>
                                        <p className="text-sm text-zinc-400 leading-relaxed">{work.details.messaggio}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    <div className="min-h-screen bg-black text-white overflow-x-hidden font-sans">
                        <section className="relative h-screen flex flex-col justify-center items-center text-center px-6 bg-gradient-to-b from-black via-zinc-900 to-black">
                            <div className="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,white_0%,transparent_70%)]"></div>

                            <h1 className="text-7xl md:text-9xl font-black uppercase tracking-[10px] mb-8 leading-none">
                                Dadaismo<br />&<br />Surrealismo
                            </h1>

                            <p className="text-2xl text-zinc-300 max-w-4xl leading-relaxed">
                                Ribellione • Sogno • Inconscio • Libertà Artistica • Provocazione
                            </p>
                        </section>

                        <section className="py-24 px-6 bg-zinc-950">
                            <div className="max-w-7xl mx-auto text-center mb-20">
                                <h2 className="text-7xl font-black uppercase mb-10">Scaletta</h2>

                                <div className="grid md:grid-cols-3 gap-8">
                                    {['Contesto Storico', 'Dadaismo & Duchamp', 'Surrealismo & Dalí'].map((item, i) => (
                                        <div key={i} className="bg-black border border-zinc-800 rounded-3xl p-10 shadow-2xl">
                                            <p className="text-6xl font-black mb-4">{i + 1}</p>
                                            <h3 className="text-2xl font-bold">{item}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="max-w-7xl mx-auto mb-24">
                                <h3 className="text-6xl font-black uppercase mb-12 text-center">Contesto Storico</h3>

                                <div className="grid md:grid-cols-3 gap-8 mb-14">
                                    {historicalImages.map((img, i) => (
                                        <div key={i} className="overflow-hidden rounded-[30px] border border-zinc-800 shadow-2xl h-[320px] bg-black">
                                            <img src={img} alt="Contesto storico" className="w-full h-full object-cover hover:scale-110 transition duration-700" />
                                        </div>
                                    ))}
                                </div>

                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="bg-zinc-900 rounded-[40px] p-14 border border-zinc-800 shadow-2xl min-h-[450px]">
                                        <h3 className="text-4xl font-black uppercase mb-8">Contesto Storico</h3>
                                        <div className="space-y-6 text-2xl text-zinc-300 leading-relaxed">
                                            <p>• Prima Guerra Mondiale</p>
                                            <p>• Crisi dei valori tradizionali</p>
                                            <p>• Nascita delle avanguardie</p>
                                            <p>• Rifiuto dell'arte classica</p>
                                            <p>• Nuova libertà artistica</p>
                                        </div>
                                    </div>

                                    <div className="bg-zinc-900 rounded-[40px] p-14 border border-zinc-800 shadow-2xl min-h-[450px]">
                                        <h3 className="text-4xl font-black uppercase mb-8">Caratteristiche</h3>
                                        <div className="space-y-6 text-2xl text-zinc-300 leading-relaxed">
                                            <p>• Anti-arte</p>
                                            <p>• Inconscio e sogni</p>
                                            <p>• Provocazione</p>
                                            <p>• Simbolismo</p>
                                            <p>• Psicoanalisi</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="dadaismo" className="py-24 px-6 bg-black">
                            <div className="max-w-7xl mx-auto">
                                <div className="mb-16 text-center">
                                    <h2 className="text-7xl font-black uppercase mb-6">Dadaismo</h2>
                                    <p className="text-zinc-400 text-2xl">1916 • Zurigo • Anti-arte • Ready-made</p>
                                </div>

                                <AuthorBanner author={authors.duchamp} />

                                <div className="space-y-20">
                                    {dadaWorks.map((work, index) => (
                                        <ArtworkCard key={index} work={work} border="border-zinc-700 hover:border-white" />
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section id="surrealismo" className="py-24 px-6 bg-zinc-950">
                            <div className="max-w-7xl mx-auto">
                                <div className="mb-16 text-center">
                                    <h2 className="text-7xl font-black uppercase mb-6">Surrealismo</h2>
                                    <p className="text-zinc-400 text-2xl">1924 • Sogno • Freud • Inconscio</p>
                                </div>

                                <AuthorBanner author={authors.dali} />

                                <div className="space-y-20">
                                    {surrealWorks.map((work, index) => (
                                        <ArtworkCard key={index} work={work} border="border-yellow-200/20 hover:border-yellow-200" />
                                    ))}
                                </div>
                            </div>
                        </section>
                    </div>

                    {selectedImage && (
                        <div className="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 overflow-auto">
                            <button
                                onClick={() => setSelectedImage(null)}
                                className="absolute top-6 right-8 text-6xl text-white font-black hover:text-red-500 transition"
                            >
                                ×
                            </button>

                            <h2 className="text-5xl font-black uppercase mb-8 text-center mt-12 md:mt-0">
                                {selectedImage.title}
                            </h2>

                            <div className="relative w-full max-w-6xl border-4 border-white rounded-3xl overflow-hidden shadow-2xl bg-black">
                                <img
                                    src={selectedImage.image}
                                    alt={selectedImage.title}
                                    className="w-full max-h-[75vh] object-contain select-none"
                                    draggable="false"
                                />

                                <canvas
                                    ref={canvasRef}
                                    width={1400}
                                    height={900}
                                    className="absolute inset-0 w-full h-full cursor-crosshair"
                                    onMouseDown={startDraw}
                                    onMouseMove={draw}
                                    onMouseUp={stopDraw}
                                    onMouseLeave={stopDraw}
                                />
                            </div>

                            <div className="w-full max-w-5xl mt-8 bg-zinc-900/90 border border-white/10 rounded-[30px] p-6 shadow-2xl">
                                <div className="flex flex-wrap gap-6 items-center justify-center mb-6">
                                    {[
                                        '#ff0000', '#00ff88', '#00aaff', '#ffff00', 
                                        '#ffffff', '#ff00ff', '#ff8800', '#000000'
                                    ].map((color) => (
                                        <button
                                            key={color}
                                            onClick={() => setBrushColor(color)}
                                            className={`w-12 h-12 rounded-full border-4 transition hover:scale-110 ${brushColor === color ? 'border-white scale-125' : 'border-transparent'}`}
                                            style={{ backgroundColor: color }}
                                        />
                                    ))}
                                </div>

                                <div className="flex flex-col items-center mb-8">
                                    <label className="text-xl font-black uppercase mb-3 tracking-widest">
                                        Dimensione Pennello: {brushSize}px
                                    </label>
                                    <input
                                        type="range"
                                        min="2"
                                        max="20"
                                        value={brushSize}
                                        onChange={(e) => setBrushSize(Number(e.target.value))}
                                        className="w-full max-w-md accent-white cursor-pointer"
                                    />
                                </div>

                                <div className="flex gap-6 flex-wrap justify-center">
                                    <button
                                        onClick={clearCanvas}
                                        className="px-8 py-4 rounded-2xl bg-red-600 hover:bg-red-500 transition font-black"
                                    >
                                        Cancella Disegni
                                    </button>

                                    <button
                                        onClick={() => setSelectedImage(null)}
                                        className="px-8 py-4 rounded-2xl bg-white text-black hover:scale-105 transition font-black"
                                    >
                                        Chiudi Modale
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        // Renderizzazione dell'App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ArtePresentation />);

    </script>
</body>
</html>
